name: Run API tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install fastapi uvicorn httpx pydantic joblib numpy pytest

      - name: Run tests
        run: PYTHONPATH=. pytest tests/test_api.py -v