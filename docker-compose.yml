services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: parislens
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d parislens"]
      interval: 5s
      retries: 10
  pipeline:
    build: .
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/parislens
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pipeline_logs:/app  
      - model_artifacts:/app/model_artifacts

volumes:
  pg_data:
  pipeline_logs:
  model_artifacts:  
